name: Axiom Showcase

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          repository: Nashid-k/Nashid-k
          path: profile
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v3
        with:
          repository: Nashid-k/axiom-e-learning
          path: axiom
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Update README
        run: |
          cd profile
          node scripts/showcase.mjs
        env:
          AXIOM_DATA_DIR: ../axiom/src/data
      - name: Commit & Push
        run: |
          cd profile
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "chore: update featured curriculum" || exit 0
          git push
